<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Backlog Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222635;
    --border: #2e3347;
    --green: #00c97a;
    --green-dim: rgba(0,201,122,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --blue: #60a5fa;
    --text: #e8eaf0;
    --muted: #6b7280;
    --pill-open: #00c97a;
    --pill-pending: #f59e0b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top:0; z-index:100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .topbar-title {
    font-size: 15px; font-weight: 600; letter-spacing: .03em;
    color: #fff; flex-shrink:0;
  }
  .topbar-title span { color: var(--green); }

  .stats-row {
    display: flex; gap:16px; flex-wrap:wrap; flex:1;
    justify-content: flex-end;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap:6px;
  }
  .stat-chip strong { color: var(--text); font-size:14px; font-weight:600; }

  /* ── CONTROLS ── */
  .controls {
    padding: 18px 28px 12px;
    display: flex; align-items: center; gap:12px; flex-wrap:wrap;
  }
  .controls label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }

  .filter-group { display:flex; gap:6px; }
  .btn-filter {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight:500;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-filter:hover { border-color: #555; color: var(--text); }
  .btn-filter.active-all  { background: var(--surface2); border-color:#60a5fa; color:#60a5fa; }
  .btn-filter.active-open { background: var(--green-dim); border-color:var(--green); color:var(--green); }
  .btn-filter.active-pending { background: var(--amber-dim); border-color:var(--amber); color:var(--amber); }

  .search-wrap { margin-left:auto; position:relative; }
  .search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 34px;
    color: var(--text); font-family: 'DM Sans',sans-serif; font-size:13px;
    width: 220px; outline:none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: #60a5fa; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:14px; pointer-events:none;
  }

  /* ── SEGMENT FILTERS ── */
  .seg-section {
    padding: 0 28px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .seg-section-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; flex-shrink:0; }
  .seg-filters { display:flex; gap:6px; flex-wrap:wrap; flex:1; }
  .seg-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans',sans-serif;
    font-size: 12px; font-weight:500;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .seg-tab:hover { background: var(--surface2); color:var(--text); }
  .seg-tab.active { border-color: var(--seg-color, #60a5fa); color:#fff; background: color-mix(in srgb, var(--seg-color, #60a5fa) 12%, transparent); }
  .seg-tab .seg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .seg-tab .seg-count {
    display:inline-block;
    background: var(--border); color:var(--muted);
    border-radius:10px; padding:1px 7px; font-size:11px;
  }
  .seg-tab.active .seg-count { color: var(--seg-color, #60a5fa); background: color-mix(in srgb, var(--seg-color,#60a5fa) 15%, transparent); }
  .btn-clear-segs {
    padding: 5px 12px; border-radius:6px;
    border: 1px dashed var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans',sans-serif; font-size:11px;
    cursor:pointer; transition: all .15s; flex-shrink:0;
  }
  .btn-clear-segs:hover { border-color:#555; color:var(--text); }

  /* ── UPLOAD ── */
  .upload-btn {
    padding: 5px 14px; border-radius:6px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted);
    font-family: 'DM Sans',sans-serif; font-size:12px;
    cursor:pointer; transition: all .15s; display:flex; align-items:center; gap:6px;
  }
  .upload-btn:hover { border-color:#60a5fa; color:#60a5fa; }
  #fileInput { display:none; }
  .upload-toast {
    position:fixed; bottom:24px; right:24px;
    background: var(--surface2); border:1px solid var(--green);
    border-radius:8px; padding:10px 18px;
    font-size:13px; color:var(--green);
    opacity:0; transition: opacity .3s; pointer-events:none; z-index:999;
  }
  .upload-toast.show { opacity:1; }

  /* ── GRID ── */
  .grid {
    padding: 0 28px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ── SEGMENT CARD ── */
  .seg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .seg-card:hover { border-color: #3e4563; }

  .seg-card-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content:space-between; align-items:center;
  }
  .seg-name {
    font-size: 13px; font-weight:600; letter-spacing:.02em;
    display:flex; align-items:center; gap:8px;
  }
  .seg-dot { width:8px;height:8px;border-radius:50%; flex-shrink:0; }
  .seg-total {
    font-family: 'DM Mono', monospace;
    font-size: 20px; font-weight:500; color:#fff;
  }
  .seg-sub { font-size:10px; color:var(--muted); text-align:right; margin-top:1px; }

  /* ── TOPIC ROWS ── */
  .topic-list { padding: 8px 0; }

  .topic-row {
    padding: 6px 18px;
    display: flex; justify-content:space-between; align-items:flex-start;
    border-bottom: 1px solid rgba(46,51,71,0.5);
    cursor: pointer; transition: background .1s;
  }
  .topic-row:last-child { border-bottom:none; }
  .topic-row:hover { background: var(--surface2); }
  .topic-row.expanded { background: rgba(96,165,250,0.04); }

  .topic-left { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .topic-name { font-size:12px; font-weight:500; color:var(--text); }
  .topic-right { display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:8px; padding-top:2px; }

  .pill {
    border-radius:10px; padding:2px 8px;
    font-size:10px; font-weight:600; font-family:'DM Mono',monospace;
    white-space:nowrap;
  }
  .pill-open    { background:var(--green-dim);  color:var(--green); }
  .pill-pending { background:var(--amber-dim);  color:var(--amber); }
  .pill-total   { background:var(--surface2);   color:var(--muted); border:1px solid var(--border); }

  .chevron { font-size:10px; color:var(--muted); transition:transform .15s; flex-shrink:0; }
  .topic-row.expanded .chevron { transform:rotate(90deg); }

  /* ── SUBTOPICS ── */
  .subtopic-list {
    display:none; background: rgba(15,17,23,0.5);
    border-top: 1px solid var(--border);
  }
  .subtopic-list.open { display:block; }

  .subtopic-row {
    padding: 5px 18px 5px 32px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom: 1px solid rgba(46,51,71,0.3);
    font-size:11px;
  }
  .subtopic-row:last-child { border-bottom:none; }
  .subtopic-name { color:var(--muted); }
  .subtopic-pills { display:flex; gap:4px; }

  /* ── NO RESULTS ── */
  .no-results {
    grid-column:1/-1;
    text-align:center; padding:60px;
    color:var(--muted); font-size:14px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Ticket <span>Backlog</span> Dashboard</div>
  <div class="stats-row" id="statsRow"></div>
</div>

<div class="controls">
  <label>Status</label>
  <div class="filter-group">
    <button class="btn-filter active-all" data-status="all"  onclick="setStatus('all',this)">All</button>
    <button class="btn-filter" data-status="open"    onclick="setStatus('open',this)">Open</button>
    <button class="btn-filter" data-status="pending" onclick="setStatus('pending',this)">Pending</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Topic or subtopic…" oninput="render()">
  </div>
  <label class="upload-btn" title="Load a new JSON export">
    ↑ Update JSON
    <input type="file" id="fileInput" accept=".json" onchange="loadJSON(event)">
  </label>
</div>

<div class="seg-section">
  <span class="seg-section-label">Segments</span>
  <div class="seg-filters" id="segTabs"></div>
  <button class="btn-clear-segs" onclick="clearSegs()">Clear all</button>
</div>
<div id="uploadToast" class="upload-toast">✓ JSON loaded successfully</div>
<div class="grid" id="grid"></div>

const SEG_COLORS = {
  'Asset': '#f472b6',
  'Basic': '#60a5fa',
  'Business': '#818cf8',
  'NoContract': '#fb923c',
  'NotFoundInEnneo (DSGVO)': '#a78bfa',
  'Smart': '#34d399',
};

let currentStatus = 'all';
let selectedSegs = new Set(); // empty = all visible
let DATA = RAW;

function setStatus(s, btn) {
  currentStatus = s;
  document.querySelectorAll('.btn-filter').forEach(b => b.className = 'btn-filter');
  btn.classList.add('active-' + s);
  render();
}

function toggleSeg(seg) {
  if (selectedSegs.has(seg)) selectedSegs.delete(seg);
  else selectedSegs.add(seg);
  render();
}

function clearSegs() {
  selectedSegs.clear();
  render();
}

const UPLOAD_PASSWORD = 'rabot2026';

function loadJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const pwd = prompt('Enter password to update data:');
  if (pwd !== UPLOAD_PASSWORD) {
    alert('Incorrect password.');
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      DATA = JSON.parse(e.target.result);
      selectedSegs.clear();
      document.getElementById('searchInput').value = '';
      render();
      const toast = document.getElementById('uploadToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    } catch(err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return DATA.filter(d => {
    if (currentStatus !== 'all' && d.status !== currentStatus) return false;
    if (selectedSegs.size > 0 && !selectedSegs.has(d.Segment)) return false;
    if (q && !d.topic.toLowerCase().includes(q) && !d.subtopic.toLowerCase().includes(q)) return false;
    return true;
  });
}

function buildSegmentData(data) {
  const segs = {};
  data.forEach(d => {
    if (!segs[d.Segment]) segs[d.Segment] = {};
    if (!segs[d.Segment][d.topic]) segs[d.Segment][d.topic] = {};
    const key = d.subtopic;
    if (!segs[d.Segment][d.topic][key]) segs[d.Segment][d.topic][key] = {open:0, pending:0};
    segs[d.Segment][d.topic][key][d.status] += parseInt(d.Counts);
  });
  return segs;
}

function totalFor(topicObj) {
  let o=0, p=0;
  Object.values(topicObj).forEach(st => { o += st.open||0; p += st.pending||0; });
  return {open:o, pending:p, total:o+p};
}

function render() {
  const data = getFiltered();
  const segData = buildSegmentData(data);

  // Update stats
  const totalOpen = data.filter(d=>d.status==='open').reduce((a,d)=>a+parseInt(d.Counts),0);
  const totalPending = data.filter(d=>d.status==='pending').reduce((a,d)=>a+parseInt(d.Counts),0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><strong>${(totalOpen+totalPending).toLocaleString('de')}</strong> Gesamt</div>
    <div class="stat-chip" style="border-color:rgba(0,201,122,.3)"><strong style="color:var(--green)">${totalOpen.toLocaleString('de')}</strong> Open</div>
    <div class="stat-chip" style="border-color:rgba(245,158,11,.3)"><strong style="color:var(--amber)">${totalPending.toLocaleString('de')}</strong> Pending</div>
  `;

  // Update seg tabs — multi-select, counts based on full DATA (no status/search filter)
  const allSegs = [...new Set(DATA.map(d=>d.Segment))].sort();
  const tabsEl = document.getElementById('segTabs');
  tabsEl.innerHTML = allSegs.map((s, i) => {
    const color = SEG_COLORS[s] || '#888';
    const cnt = DATA.filter(d => d.Segment === s && (currentStatus === 'all' || d.status === currentStatus))
                    .reduce((a,d)=>a+parseInt(d.Counts),0);
    const isActive = selectedSegs.has(s);
    return `<button class="seg-tab ${isActive?'active':''}" 
      style="--seg-color:${color}" 
      data-seg-index="${i}">
      <span class="seg-dot" style="background:${color}"></span>
      ${s}<span class="seg-count">${cnt.toLocaleString('de')}</span>
    </button>`;
  }).join('');

  // Attach click handlers after rendering (avoids inline onclick escaping issues)
  tabsEl.querySelectorAll('.seg-tab').forEach((btn, i) => {
    btn.addEventListener('click', () => toggleSeg(allSegs[i]));
  });

  // Render cards
  const grid = document.getElementById('grid');
  if (Object.keys(segData).length === 0) {
    grid.innerHTML = '<div class="no-results">No tickets match the current filters.</div>';
    return;
  }

  grid.innerHTML = Object.entries(segData).sort((a,b)=>a[0].localeCompare(b[0])).map(([seg, topics]) => {
    const color = SEG_COLORS[seg] || '#888';
    const segTotals = Object.values(topics).reduce((acc,t)=>{
      const tot = totalFor(t); acc.open+=tot.open; acc.pending+=tot.pending; return acc;
    },{open:0,pending:0});

    const topicRows = Object.entries(topics)
      .sort((a,b) => totalFor(b[1]).total - totalFor(a[1]).total)
      .map(([topic, subtopics]) => {
        const tt = totalFor(subtopics);
        const subRows = Object.entries(subtopics)
          .sort((a,b) => (b[1].open+b[1].pending)-(a[1].open+a[1].pending))
          .map(([sub, counts]) => {
            const tot = (counts.open||0)+(counts.pending||0);
            const pills = [];
            if (currentStatus !== 'pending' && counts.open) pills.push(`<span class="pill pill-open">${counts.open}</span>`);
            if (currentStatus !== 'open' && counts.pending) pills.push(`<span class="pill pill-pending">${counts.pending}</span>`);
            return `<div class="subtopic-row">
              <span class="subtopic-name">${sub}</span>
              <div class="subtopic-pills">${pills.join('')}<span class="pill pill-total">${tot}</span></div>
            </div>`;
          }).join('');

        const tpills = [];
        if (currentStatus !== 'pending' && tt.open) tpills.push(`<span class="pill pill-open">${tt.open}</span>`);
        if (currentStatus !== 'open' && tt.pending) tpills.push(`<span class="pill pill-pending">${tt.pending}</span>`);
        tpills.push(`<span class="pill pill-total">${tt.total}</span>`);

        const tid = `t_${seg}_${topic}`.replace(/[^a-zA-Z0-9_]/g,'_');
        return `
          <div class="topic-row" onclick="toggleTopic('${tid}',this)">
            <div class="topic-left"><span class="topic-name">${topic}</span></div>
            <div class="topic-right">${tpills.join('')}<span class="chevron">▶</span></div>
          </div>
          <div class="subtopic-list" id="${tid}">${subRows}</div>
        `;
      }).join('');

    return `
      <div class="seg-card">
        <div class="seg-card-header">
          <div class="seg-name">
            <span class="seg-dot" style="background:${color}"></span>
            ${seg}
          </div>
          <div>
            <div class="seg-total">${(segTotals.open+segTotals.pending).toLocaleString('de')}</div>
            <div class="seg-sub">
              ${currentStatus!=='pending'?`<span style="color:var(--green)">${segTotals.open} open</span>`:''}
              ${currentStatus==='all'?' · ':''}
              ${currentStatus!=='open'?`<span style="color:var(--amber)">${segTotals.pending} pending</span>`:''}
            </div>
          </div>
        </div>
        <div class="topic-list">${topicRows}</div>
      </div>
    `;
  }).join('');
}

function toggleTopic(id, row) {
  const list = document.getElementById(id);
  list.classList.toggle('open');
  row.classList.toggle('expanded');
}

render();
</script>
