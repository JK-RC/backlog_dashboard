<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Backlog · Rabot Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #141618;
    --surface:   #1e2124;
    --surface2:  #26292e;
    --surface3:  #2e3238;
    --border:    #33383f;
    --border2:   #3d4349;
    --ink:       #e8eaed;
    --ink-soft:  #b0b6bf;
    --muted:     #727a85;
    --muted2:    #505860;
    --open-bg:        #1e2124;
    --open-border:    #4a5060;
    --open-text:      #e8eaed;
    --pending-bg:     #2a2d32;
    --pending-text:   #8a909a;
    --total-text:     #e8eaed;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(20,22,24,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
  }

  .brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .brand-title {
    font-size: 14px; font-weight: 600; color: var(--ink);
    letter-spacing: 0.03em;
  }
  .brand-divider { width: 1px; height: 16px; background: var(--border2); }
  .brand-sub {
    font-size: 11px; font-weight: 400; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  .stats-row {
    display: flex; gap: 8px; flex-wrap: wrap; flex: 1;
    justify-content: flex-end; align-items: center;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 12px;
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 7px;
  }
  .stat-chip strong {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; color: var(--ink);
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 12px 28px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .controls-label {
    font-size: 10px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; flex-shrink: 0;
  }
  .filter-group { display: flex; gap: 3px; }
  .btn-filter {
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .btn-filter:hover { background: var(--surface2); color: var(--ink-soft); }
  .btn-filter.active-all     { background: var(--ink); border-color: var(--ink); color: #141618; }
  .btn-filter.active-open    { background: var(--surface3); border-color: var(--ink-soft); color: var(--ink); }
  .btn-filter.active-pending { background: var(--surface2); border-color: var(--muted); color: var(--ink-soft); }

  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px 6px 28px;
    color: var(--ink); font-family: 'Inter', sans-serif; font-size: 12px;
    width: 200px; outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--border2); }
  .search-wrap input::placeholder { color: var(--muted2); }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    color: var(--muted2); font-size: 12px; pointer-events: none;
  }

  .upload-btn {
    padding: 5px 12px; border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'Inter', sans-serif; font-size: 12px;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .upload-btn:hover { border-color: var(--border2); color: var(--ink-soft); background: var(--surface2); }
  #fileInput { display: none; }
  #downloadBtn { border-color: #2d6e4a; color: #4aaa7a; }
  #downloadBtn:hover { background: rgba(45,110,74,0.15); }

  /* ── SEGMENTS ── */
  .seg-section {
    padding: 10px 28px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .seg-section-label {
    font-size: 10px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; flex-shrink: 0;
  }
  .seg-filters { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .seg-tab {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 400;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .seg-tab:hover { color: var(--ink-soft); border-color: var(--border2); background: var(--surface2); }
  .seg-tab.active {
    border-color: var(--seg-color, #e8eaed);
    color: var(--ink);
    background: var(--surface2);
    font-weight: 500;
    box-shadow: inset 3px 0 0 var(--seg-color);
  }
  .seg-tab .seg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .seg-tab .seg-count { font-size: 10px; color: var(--muted2); }
  .seg-tab.active .seg-count { color: var(--muted); }

  .btn-clear-segs {
    padding: 4px 10px; border-radius: 4px;
    border: 1px dashed var(--border);
    background: transparent; color: var(--muted2);
    font-family: 'Inter', sans-serif; font-size: 11px;
    cursor: pointer; transition: all .15s; flex-shrink: 0;
  }
  .btn-clear-segs:hover { border-color: var(--muted2); color: var(--muted); }

  /* ── GRID ── */
  .grid {
    padding: 20px 28px 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  /* ── SEGMENT CARD ── */
  .seg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .seg-card:hover { border-color: var(--border2); }

  .seg-card-header {
    padding: 13px 16px 11px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
    border-left: 3px solid var(--seg-color, var(--border2));
  }
  .seg-name {
    display: flex; align-items: center; gap: 8px;
  }
  .seg-name-text {
    font-size: 13px; font-weight: 600; color: var(--ink);
    letter-spacing: 0.01em;
  }
  .seg-numbers { text-align: right; }
  .seg-total-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 600; color: var(--ink); line-height: 1;
    letter-spacing: -0.02em;
  }
  .seg-breakdown {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted); margin-top: 4px;
    display: flex; gap: 8px; justify-content: flex-end;
  }

  /* ── TOPIC ROWS ── */
  .topic-list { padding: 3px 0; }
  .topic-row {
    padding: 7px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(51,56,63,0.6);
    cursor: pointer; transition: background .1s;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: var(--surface2); }
  .topic-row.expanded { background: var(--surface2); }

  .topic-name { font-size: 12px; font-weight: 400; color: var(--ink-soft); }
  .topic-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  /* Pills */
  .pill {
    border-radius: 3px; padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .pill-open    { background: var(--surface3); color: var(--ink);      border: 1px solid var(--border2); }
  .pill-pending { background: var(--surface2); color: var(--muted);    border: 1px solid transparent; }
  .pill-total   { background: transparent;     color: var(--ink);      font-weight: 700; font-size: 12px; border: none; padding-right: 0; }

  .chevron { font-size: 9px; color: var(--muted2); transition: transform .15s; flex-shrink: 0; margin-left: 3px; }
  .topic-row.expanded .chevron { transform: rotate(90deg); }

  /* ── SUBTOPICS ── */
  .subtopic-list {
    display: none; background: #191c1f;
    border-top: 1px solid var(--border);
  }
  .subtopic-list.open { display: block; }
  .subtopic-row {
    padding: 5px 16px 5px 28px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(51,56,63,0.4);
    font-size: 11px;
  }
  .subtopic-row:last-child { border-bottom: none; }
  .subtopic-name { color: var(--muted); }
  .subtopic-pills { display: flex; gap: 4px; align-items: center; }

  /* ── NO RESULTS ── */
  .no-results {
    grid-column: 1/-1;
    text-align: center; padding: 72px;
    color: var(--muted2); font-size: 14px; font-style: italic;
  }

  /* ── TOAST ── */
  .upload-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid #2d6e4a;
    border-radius: 6px; padding: 10px 18px;
    font-size: 12px; color: #4aaa7a;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
  }
  .upload-toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

<div class="topbar">
  <div class="brand">
    <span class="brand-title">Ticket Backlog</span>

    ↓ Download updated file

</div>

<div class="seg-section">

  <div class="seg-filters" id="segTabs"></div>

</div>

<div id="uploadToast" class="upload-toast">✓ Data updated</div>
<div class="grid" id="grid"></div>

const SEG_ORDER = ['Basic','Smart','Asset','Business','NoContract','NotFoundInEnneo (DSGVO)'];
const SEG_COLORS = {
  'Basic':                   '#6b9fd4',
  'Smart':                   '#5bbf8a',
  'Asset':                   '#e07b5a',
  'Business':                '#9b7de0',
  'NoContract':              '#e0b85a',
  'NotFoundInEnneo (DSGVO)': '#5ab8d4',
};

const UPLOAD_PASSWORD = 'rabot2026';
let currentStatus = 'open';
let selectedSegs = new Set();
let DATA = RAW;

const GENERATED_DATE = '10.03.2026';

function setStatus(s, btn) {
  currentStatus = s;
  document.querySelectorAll('.btn-filter').forEach(b => b.className = 'btn-filter');
  btn.classList.add('active-' + s);
  render();
}

function toggleSeg(seg) {
  if (selectedSegs.has(seg)) selectedSegs.delete(seg);
  else selectedSegs.add(seg);
  render();
}

function clearSegs() { selectedSegs.clear(); render(); }

function loadJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const pwd = prompt('Enter password to update data:');
  if (pwd !== UPLOAD_PASSWORD) { alert('Incorrect password.'); event.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      DATA = JSON.parse(e.target.result);
      selectedSegs.clear();
      document.getElementById('searchInput').value = '';
      render();
      document.getElementById('downloadBtn').style.display = 'flex';
      const t = document.getElementById('uploadToast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    } catch(err) { alert('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function downloadUpdatedHTML() {
  const pwd = prompt('Enter password to download:');
  if (pwd !== UPLOAD_PASSWORD) { alert('Incorrect password.'); return; }
  const today = new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
  const src = document.documentElement.outerHTML;
  const out = src
    .replace(/const RAW = \[.*?\];/s, 'const RAW = ' + JSON.stringify(DATA) + ';')
    .replace(/const GENERATED_DATE = '.*?';/, "const GENERATED_DATE = '" + today + "';");
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out], {type:'text/html'}));
  a.download = 'index.html'; a.click();
  URL.revokeObjectURL(a.href);
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return DATA.filter(d => {
    if (currentStatus !== 'all' && d.status !== currentStatus) return false;
    if (selectedSegs.size > 0 && !selectedSegs.has(d.Segment)) return false;
    if (q && !d.topic.toLowerCase().includes(q) && !d.subtopic.toLowerCase().includes(q)) return false;
    return true;
  });
}

function buildSegmentData(data) {
  const segs = {};
  data.forEach(d => {
    if (!segs[d.Segment]) segs[d.Segment] = {};
    if (!segs[d.Segment][d.topic]) segs[d.Segment][d.topic] = {};
    if (!segs[d.Segment][d.topic][d.subtopic]) segs[d.Segment][d.topic][d.subtopic] = {open:0,pending:0};
    segs[d.Segment][d.topic][d.subtopic][d.status] += parseInt(d.Counts);
  });
  return segs;
}

function totalFor(obj) {
  let o=0,p=0;
  Object.values(obj).forEach(s => { o+=s.open||0; p+=s.pending||0; });
  return {open:o,pending:p,total:o+p};
}

function toggleTopic(id, row) {
  document.getElementById(id).classList.toggle('open');
  row.classList.toggle('expanded');
}

function render() {
  const data = getFiltered();
  const segData = buildSegmentData(data);

  const totalOpen = data.filter(d=>d.status==='open').reduce((a,d)=>a+parseInt(d.Counts),0);
  const totalPending = data.filter(d=>d.status==='pending').reduce((a,d)=>a+parseInt(d.Counts),0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><strong>${(totalOpen+totalPending).toLocaleString('de')}</strong> Gesamt</div>
    <div class="stat-chip"><strong>${totalOpen.toLocaleString('de')}</strong> Open</div>
    <div class="stat-chip"><strong style="color:var(--muted)">${totalPending.toLocaleString('de')}</strong> Pending</div>
  `;

  const allSegsInData = [...new Set(DATA.map(d=>d.Segment))];
  const orderedSegs = [...SEG_ORDER.filter(s=>allSegsInData.includes(s)),
                       ...allSegsInData.filter(s=>!SEG_ORDER.includes(s)).sort()];

  const tabsEl = document.getElementById('segTabs');
  tabsEl.innerHTML = orderedSegs.map((s,i) => {
    const color = SEG_COLORS[s]||'#888';
    const cnt = DATA.filter(d=>d.Segment===s&&(currentStatus==='all'||d.status===currentStatus))
                    .reduce((a,d)=>a+parseInt(d.Counts),0);
    return `<button class="seg-tab ${selectedSegs.has(s)?'active':''}" style="--seg-color:${color}" data-i="${i}">
      <span class="seg-dot" style="background:${color}"></span>${s}<span class="seg-count">${cnt.toLocaleString('de')}</span>
    </button>`;
  }).join('');
  tabsEl.querySelectorAll('.seg-tab').forEach((btn,i) => btn.addEventListener('click', ()=>toggleSeg(orderedSegs[i])));

  const grid = document.getElementById('grid');
  if (!Object.keys(segData).length) {
    grid.innerHTML = '<div class="no-results">No tickets match the current filters.</div>';
    return;
  }

  const sorted = [...SEG_ORDER.filter(s=>segData[s]).map(s=>[s,segData[s]]),
                  ...Object.entries(segData).filter(([s])=>!SEG_ORDER.includes(s)).sort()];

  grid.innerHTML = sorted.map(([seg,topics]) => {
    const color = SEG_COLORS[seg]||'#888';
    const totals = Object.values(topics).reduce((acc,t)=>{const x=totalFor(t);acc.open+=x.open;acc.pending+=x.pending;return acc;},{open:0,pending:0});

    const rows = Object.entries(topics)
      .sort((a,b)=>totalFor(b[1]).total-totalFor(a[1]).total)
      .map(([topic,subs]) => {
        const tt = totalFor(subs);
        const subRows = Object.entries(subs)
          .sort((a,b)=>(b[1].open+b[1].pending)-(a[1].open+a[1].pending))
          .map(([sub,c]) => {
            const tot=(c.open||0)+(c.pending||0);
            const p=[];
            if(currentStatus!=='pending'&&c.open) p.push(`<span class="pill pill-open">${c.open}</span>`);
            if(currentStatus!=='open'&&c.pending) p.push(`<span class="pill pill-pending">${c.pending}</span>`);
            return `<div class="subtopic-row"><span class="subtopic-name">${sub}</span><div class="subtopic-pills">${p.join('')}<span class="pill pill-total">${tot}</span></div></div>`;
          }).join('');

        const tp=[];
        if(currentStatus!=='pending'&&tt.open) tp.push(`<span class="pill pill-open">${tt.open}</span>`);
        if(currentStatus!=='open'&&tt.pending) tp.push(`<span class="pill pill-pending">${tt.pending}</span>`);
        tp.push(`<span class="pill pill-total">${tt.total}</span>`);

        const tid='t'+Math.random().toString(36).slice(2,10);
        return `<div class="topic-row" onclick="toggleTopic('${tid}',this)">
          <span class="topic-name">${topic}</span>
          <div class="topic-right">${tp.join('')}<span class="chevron">▶</span></div>
        </div>
        <div class="subtopic-list" id="${tid}">${subRows}</div>`;
      }).join('');

    return `<div class="seg-card">
      <div class="seg-card-header" style="--seg-color:${color}">
        <div class="seg-name">
          <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
          <span class="seg-name-text">${seg}</span>
        </div>
        <div class="seg-numbers">
          <div class="seg-total-num">${(totals.open+totals.pending).toLocaleString('de')}</div>
          <div class="seg-breakdown">
            ${currentStatus!=='pending'?`<span>${totals.open.toLocaleString('de')} open</span>`:''}
            ${currentStatus==='all'?'<span style="color:var(--muted2)">·</span>':''}
            ${currentStatus!=='open'?`<span style="color:var(--muted2)">${totals.pending.toLocaleString('de')} pend</span>`:''}
          </div>
        </div>
      </div>
      <div class="topic-list">${rows}</div>
    </div>`;
  }).join('');
}

render();
document.getElementById('genDate').textContent = 'Generated ' + GENERATED_DATE;
</script>
